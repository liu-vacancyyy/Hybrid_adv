# simulation config
sim_freq: 200         # 1/dt = 1/0.005
solver: rk4
dt: 0.005
num_agents: 1
num_states: 4
num_controls: 1
num_actions: 1
num_observation: 9
max_steps: 5000       # episode length: 25s

# noise
noise_scale: 0.01

# target config (random angle target: [-2, +2], initial θ=0)
max_theta_target: 2.0       # rad, upper target bound
min_theta_target: -2.0      # rad, lower target bound
step_error_range: 2.0       # max |target - initial|

# state limits (for termination)
max_theta: 3.0          # rad, must be > 2.0 to allow some overshoot margin
max_q: 10.0             # rad/s
max_u: 200.0
max_w: 50.0

# check interval for unreach
max_check_interval: 2000
min_check_interval: 200
