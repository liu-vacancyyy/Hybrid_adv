# Dryden-wind human RC command tracking task.

# atmosphere / observation noise
airspeed: 0
noise_scale: 0.01
enable_wind: true
enable_dryden_turbulence: true
dryden_randomize: true
dryden_domain_randomization: true
dryden_sigma_curriculum_enable: true
dryden_sigma_ref: 1.0
dryden_sigma_ref_min: 0.4
dryden_sigma_ref_max: 1.5
dryden_sigma_scale_min: 0.8
dryden_sigma_scale_max: 1.2
dryden_length_scale_min: 0.8
dryden_length_scale_max: 1.2
dryden_length_longitudinal_m: 25.0
dryden_length_lateral_m: 25.0
dryden_length_vertical_m: 8.0
dryden_external_tau_scale: 0.08
dryden_external_tau_min: 0.20
dryden_external_tau_max: 1.20
dryden_mean_wind_curriculum_enable: true
dryden_mean_wind_scale_min: 0.2
dryden_mean_wind_scale_max: 1.0
dryden_mean_wind_north_min: -2.0
dryden_mean_wind_north_max: 2.0
dryden_mean_wind_east_min: -2.0
dryden_mean_wind_east_max: 2.0
dryden_mean_wind_down_min: -0.4
dryden_mean_wind_down_max: 0.4
enable_dryden_angular_turbulence: true
dryden_pqr_sigma_ref: 0.15
dryden_pqr_sigma_scale_min: 0.8
dryden_pqr_sigma_scale_max: 1.2
dryden_pqr_tau_p: 0.8
dryden_pqr_tau_q: 0.8
dryden_pqr_tau_r: 1.0
dryden_pqr_attack_p_max: 0.6
dryden_pqr_attack_q_max: 0.6
dryden_pqr_attack_r_max: 0.5

# Equivalent low-speed wind loading. These are not high-fidelity aerodynamic
# derivatives; they make Dryden wind act on the multirotor-hover airframe as
# body drag plus moment about an offset center of pressure.
wind_drag_enable: true
wind_body_cda_x: 0.10
wind_body_cda_y: 0.18
wind_body_cda_z: 0.14
wind_cp_x: 0.02
wind_cp_y: 0.0
wind_cp_z: -0.06
wind_pqr_torque_enable: true
wind_pqr_accel_gain_p: 0.8
wind_pqr_accel_gain_q: 0.8
wind_pqr_accel_gain_r: 0.6
wind_force_clip: 25.0
wind_moment_clip: 5.0

# simulation config
solver: euler
dt: 0.02
max_steps: 1500              # 30 s episode at 50 Hz
num_agents: 1
num_states: 12
num_controls: 5
num_actions: 5
num_observation: 30

# aircraft / safety config
altitude_limit: 0.2
acceleration_limit: 12.0         # wind-aware RC task: avoid killing normal early transients
max_velocity: 10             # LearningToFly high-speed guard
min_alpha: -10
max_alpha: 20
min_beta: -15
max_beta: 15
max_omega: 4
max_pitch: 25
max_roll: 30
color: Red
model: hybrid
termination_verbose: false
enable_action_filter: true
action_filter_alpha: 0.25    # filtered = 0.75 * previous_action + 0.25 * current_action

# Sensor noise follows HoverTask's convention: add zero-mean noise to physical
# sensor variables before normalization. get_clean_obs(env) bypasses it.
# LearningToFly uses no position/altitude white noise; keep altitude noise small
# for low-altitude hover instead of the earlier 1 m value.
enable_sensor_noise: true
sensor_pos_std:   0.02      # m      altitude channel in rc_human
sensor_vel_std:   0.02      # m/s    zero-mean velocity / airspeed observation noise
sensor_att_std:   0.005     # rad    roll / pitch / yaw
sensor_omega_std: 0.0005    # rad/s  body angular rate

# PX4 VTOL-MC human RC command generator.
# VTOL MC mode uses the multicopter manual task path. Raw horizontal sticks pass
# through MAN_DEADZONE/expo, PX4's unit-circle stick limiting, forward/back/side
# velocity scaling, and heading-frame rotation into local N/E velocity setpoints.
# The magnitude limits below are still LearningToFly's hover/low-speed command
# range. Forward velocity is asymmetric: reverse is limited to -1 m/s, while
# forward command can reach 5 m/s.
rc_human_vx_min: -1.0
rc_human_vx_max: 5.0
rc_human_vx_limit: 5.0
rc_human_vy_limit: 1.0
rc_human_vz_limit: 1.0
rc_human_yaw_rate_limit: 0.6
rc_human_deadzone: 0.10
rc_human_expo: 0.60
rc_human_velocity_tau: 0.0
rc_human_yaw_tau: 0.08
rc_human_stick_noise_std: 0.0
rc_human_dwell_min_steps: 75
rc_human_dwell_max_steps: 300
rc_human_curriculum_enable: true
rc_human_vx_forward_curriculum_enable: true
rc_human_vx_forward_easy_max: 1.0
rc_human_vx_forward_medium_max: 3.0
rc_human_mode_order: "0 1 2 5 3 4"
rc_human_levels_per_mode: 20
rc_human_max_mode_slots: 6
rc_human_mix_current: 0.35
rc_human_mix_easy_replay: 0.25
rc_human_mix_medium_replay: 0.25
rc_human_mix_random_replay: 0.15
rc_human_easy_stick: 0.25
rc_human_medium_stick: 0.65
rc_human_hard_stick: 1.0
rc_human_command_transient_grace_steps: 60   # ignore velocity tracking bad_done for 1.2 s after ordinary command jumps
rc_human_command_transient_threshold: 0.20    # raw-stick delta that starts the transient grace window
rc_human_mode3_reverse_axes: 1               # reversal flips one dominant/random axis; mode 4 covers multi-axis commands
rc_human_command_rate_limit_frac: 0.05       # max raw-stick change per 20 ms step; 0.05 means 0->1 in 0.4 s, -1->1 in 0.8 s
rc_human_command_reversal_threshold: 0.10    # sign-flip threshold on raw stick channels
rc_human_large_command_transient_delta: 1.0 # large command jump threshold across any mode
rc_human_large_command_transient_grace_steps: 100 # ignore velocity tracking bad_done for 2.0 s after large jumps
rc_human_mode5_hold_min_steps: 75             # hold forward command for at least 1.5 s before release
rc_human_mode5_hold_max_steps: 250            # force release after 5.0 s even if target speed is not reached
rc_human_mode5_release_recovery_steps: 150    # keep centered sticks for 3.0 s after release before resampling
rc_human_mode5_release_speed_error: 0.35      # m/s speed-match threshold for speed-triggered release
rc_human_mode5_release_target_frac: 0.80      # require command to reach 80% of intended pre-release speed
rc_human_success_vel_error: 0.75
rc_human_success_yaw_error: 0.30
rc_human_success_attitude_error: 0.35
rc_human_success_ignore_transient: true       # curriculum success metrics skip command-transition steps
rc_human_tracking_bad_done_enable: true
rc_human_vxyvz_dynamic_bad_done_enable: false # terminate if |vx/vy/vz error| exceeds |target - initial| + margin
rc_human_vxyvz_dynamic_bad_done_margin: 0.5   # m/s extra tolerance beyond initial-to-target velocity gap
rc_human_yaw_reward_enable: true              # keep yaw hold reward separate from curriculum yaw success checks
rc_human_bad_done_yaw_error_deg: 20.0
rc_human_bad_done_axis_vel_error: 0.5
rc_human_bad_done_vx_error_min: 0.75
rc_human_bad_done_vx_error_frac: 0.25
rc_human_bad_done_vy_error: 0.5
rc_human_bad_done_vz_error: 0.5
rc_human_bad_done_grace_steps: 50       # ignore first 1.0 s after reset
rc_human_bad_done_persist_steps: 10     # require 0.2 s continuous violation
rc_human_alt_high: 95.0
rc_human_alt_low: 5.0

# reward shaping
rc_human_w_alive: 0.2
rc_human_w_vel: 5.0
rc_human_w_yaw: 3.0
rc_human_w_attitude: 1.8
rc_human_w_omega: 1.0
rc_human_w_smooth: 0.0       # disabled for LCP training; keep code path for ablations
rc_human_w_vel_precision: 0.0 # optional normalized L1 term for near-target velocity accuracy
rc_human_w_yaw_precision: 0.0 # optional normalized L1 term for yaw target/delta accuracy
rc_human_rel_error_fixed_scale: 0.0 # m/s; >0 uses this fixed denominator for all vx/vy/vz relative terms
rc_human_rel_error_floor: 0.20 # m/s denominator floor for relative velocity-error shaping
rc_human_w_rel_tracking: 0.0   # Simulink-style linear relative tracking penalty
rc_human_w_rel_precision: 0.0  # Simulink-style exponential near-target precision bonus
rc_human_rel_precision_gain: 6.0
rc_human_w_overshoot: 0.0
rc_human_overshoot_deadband: 0.05
rc_human_w_adaptive_damping: 0.0
rc_human_adaptive_damping_gain: 4.0
rc_human_yaw_reward_mode: target # target: heading-target_heading; delta: heading-heading_prev
rc_human_sig_vel: 0.45
rc_human_sig_vx: 0.90
rc_human_sig_vy: 0.45
rc_human_sig_vz: 0.45
rc_human_sig_yaw: 0.12
rc_human_sig_yaw_delta: 0.015
rc_human_sig_attitude: 0.12
rc_human_sig_omega: 1.0
rc_human_sig_smooth: 0.7     # unused when rc_human_w_smooth is 0
rc_human_bad_done_penalty: 200.0
