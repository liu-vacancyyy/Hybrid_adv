# Dryden-wind human RC command tracking task.

# atmosphere / observation noise
airspeed: 0
noise_scale: 0.01
enable_wind: true
enable_dryden_turbulence: true
dryden_randomize: true
dryden_domain_randomization: true
dryden_sigma_curriculum_enable: true
dryden_sigma_ref: 0.6
dryden_sigma_ref_min: 0.25
dryden_sigma_ref_max: 0.9
dryden_sigma_scale_min: 0.8
dryden_sigma_scale_max: 1.2
dryden_length_scale_min: 0.8
dryden_length_scale_max: 1.2
dryden_mean_wind_curriculum_enable: true
dryden_mean_wind_scale_min: 0.2
dryden_mean_wind_scale_max: 1.0
dryden_mean_wind_north_min: -1.0
dryden_mean_wind_north_max: 1.0
dryden_mean_wind_east_min: -1.0
dryden_mean_wind_east_max: 1.0
dryden_mean_wind_down_min: -0.15
dryden_mean_wind_down_max: 0.15

# simulation config
solver: euler
dt: 0.02
max_steps: 1500              # 30 s episode at 50 Hz
num_agents: 1
num_states: 12
num_controls: 5
num_actions: 5
num_observation: 30

# aircraft / safety config
altitude_limit: 0.2
acceleration_limit: 12.0         # wind-aware RC task: avoid killing normal early transients
max_velocity: 10             # LearningToFly high-speed guard
max_y_velocity: 2            # legacy field; HighSpeed only checks total speed now
min_alpha: -10
max_alpha: 20
min_beta: -15
max_beta: 15
max_omega: 4
max_pitch: 25
max_roll: 30
color: Red
model: hybrid
termination_verbose: false
enable_action_filter: true
action_filter_alpha: 0.25    # filtered = 0.75 * previous_action + 0.25 * current_action

# Sensor noise follows HoverTask's convention: add zero-mean noise to physical
# sensor variables before normalization. get_clean_obs(env) bypasses it.
enable_sensor_noise: true
sensor_pos_std:   1.0       # m      altitude channel in rc_human
sensor_vel_std:   0.05      # m/s    velocity / airspeed observation channels
sensor_att_std:   0.005     # rad    roll / pitch / yaw
sensor_omega_std: 0.0005    # rad/s  body angular rate

# PX4-like human RC command generator
# Raw sticks are processed as PX4-style manual inputs. Horizontal stick commands
# are interpreted in the heading frame and then rotated into local N/E velocity
# setpoints. The magnitude limits below are still LearningToFly's hover/low-
# speed command range: U(-1, 1) m/s per velocity channel.
rc_human_vx_limit: 1.0
rc_human_vy_limit: 1.0
rc_human_vz_limit: 1.0
rc_human_yaw_rate_limit: 0.6
rc_human_deadzone: 0.10
rc_human_expo: 0.60
rc_human_velocity_tau: 0.55
rc_human_yaw_tau: 0.75
rc_human_stick_slew_rate: 2.0
rc_human_stick_noise_std: 0.015
rc_human_dwell_min_steps: 75
rc_human_dwell_max_steps: 300
rc_human_curriculum_enable: true
rc_human_mode_order: "0 1 2 5 3 4"
rc_human_levels_per_mode: 20
rc_human_max_mode_slots: 6
rc_human_mix_current: 0.50
rc_human_mix_easy_replay: 0.20
rc_human_mix_medium_replay: 0.20
rc_human_mix_random_replay: 0.10
rc_human_easy_stick: 0.25
rc_human_medium_stick: 0.65
rc_human_hard_stick: 1.0
rc_human_success_vel_error: 0.50
rc_human_success_yaw_error: 0.30
rc_human_success_attitude_error: 0.35
rc_human_tracking_bad_done_enable: true
rc_human_bad_done_yaw_error_deg: 20.0
rc_human_bad_done_axis_vel_error: 0.5
rc_human_bad_done_grace_steps: 50       # ignore first 1.0 s after reset
rc_human_bad_done_persist_steps: 10     # require 0.2 s continuous violation
rc_human_alt_high: 95.0
rc_human_alt_low: 5.0

# reward shaping
rc_human_w_alive: 0.2
rc_human_w_vel: 5.0
rc_human_w_yaw: 2.0
rc_human_w_attitude: 1.8
rc_human_w_omega: 1.0
rc_human_w_smooth: 1.5
rc_human_sig_vel: 0.45
rc_human_sig_yaw: 0.12
rc_human_sig_attitude: 0.12
rc_human_sig_omega: 1.0
rc_human_sig_smooth: 0.8
rc_human_bad_done_penalty: 200.0
